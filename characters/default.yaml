  night: 遅い時間ですね。無理せず休んでくださいね
weather_comment_style: |
  天気について触れるときは、相手の予定に役立つように簡潔に伝える。
news_comment_style: |
  ニュースを伝えるときは、要点をわかりやすくまとめつつ、自分なりの視点を添える。
